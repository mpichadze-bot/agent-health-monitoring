name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: write   # required for peaceiris/actions-gh-pages to push gh-pages branch
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Add .nojekyll so GitHub Pages serves _next/
        run: touch ./out/.nojekyll

      - name: Add instant redirect from root to /alerts
        run: |
          sed -i 's|<head>|<head><meta http-equiv="refresh" content="0;url=/agent-health-monitoring/alerts/">|' ./out/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: # leave empty for username.github.io/repo-name
